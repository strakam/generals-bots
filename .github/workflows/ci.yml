name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      # headless CI: pygame (GUI extra) must never try to open a display
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install engine + test deps
        run: |
          pip install -e .
          pip install pytest
      - run: pytest -q
